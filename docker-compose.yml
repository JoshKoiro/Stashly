version: '3.8'

services:
  pocketbase:
    build: 
      context: ./pocketbase
      dockerfile: Dockerfile
    volumes:
      - pb_data:/pb/pb_data
      - pb_backups:/pb/backups
    ports:
      - "8090:8090"
    networks:
      - stashly-network
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TZ=UTC
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    depends_on:
      - pocketbase
    ports:
      - "8081:3000"
    networks:
      - stashly-network
    environment:
      - NODE_ENV=production
      - POCKETBASE_URL=http://pocketbase:8090
      - REACT_APP_API_URL=http://docker.gnomehub.home:8090
      - REACT_APP_QR_SERVICE_URL=http://docker.gnomehub.home:3001
    restart: unless-stopped
    volumes:
      # Comment out this volume mount as it may override the built files
      # - ./webapp:/app
      - node_modules_webapp:/app/node_modules
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000/health/index.json || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  qr-service:
    build:
      context: ./qr-service
      dockerfile: Dockerfile
    depends_on:
      - webapp
    ports:
      - "3001:3001"
    networks:
      - stashly-network
    environment:
      - NODE_ENV=production
      - QR_SERVICE_PORT=3001
      - PDF_STORAGE_PATH=/tmp/qr-pdfs
      - CORS_ORIGIN=http://docker.gnomehub.home:8081
    volumes:
      - ./qr-service:/app
      - node_modules_qr:/app/node_modules
      - qr_pdfs:/tmp/qr-pdfs
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  stashly-network:
    driver: bridge

volumes:
  pb_data:
  pb_backups:
  qr_pdfs:
  node_modules_webapp:
  node_modules_qr: